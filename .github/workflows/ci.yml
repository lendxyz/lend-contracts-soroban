name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + wasm32v1-none)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # stellar-cli depends on libdbus-sys (keyring) which needs the system
      # dbus dev library + pkg-config to build.
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli

      # Builds both contract wasms (factory tests contractimport! the op-lend
      # wasm), then runs the full workspace test suite.
      - name: make test
        run: make test
