name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust (stable + wasm32v1-none)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Prebuilt stellar-cli binary (avoids the slow source build + its
      # libdbus-sys system dependency). libdbus-1.so.3 runtime is preinstalled.
      - name: Install Stellar CLI
        env:
          STELLAR_CLI_VERSION: 26.1.0
        run: |
          curl -sSL "https://github.com/stellar/stellar-cli/releases/download/v${STELLAR_CLI_VERSION}/stellar-cli-${STELLAR_CLI_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | sudo tar -xz -C /usr/local/bin stellar
          stellar --version

      # Builds both contract wasms (factory tests contractimport! the op-lend
      # wasm), then runs the full workspace test suite.
      - name: make test
        run: make test
